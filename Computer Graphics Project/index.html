<!DOCTYPE html>
<html lang="en">

<head>
    <title>Three.js Grass grass Example</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>

<body>

    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://threejs.org/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
		import { GLTFLoader } from 'https://threejs.org/examples/jsm/loaders/GLTFLoader.js';
		import { DirectionalLightHelper } from 'three';

        function init() {
            // -----Scene-----
            const scene = new THREE.Scene();

            //-----Texture Loader-----
            const textureLoader = new THREE.TextureLoader();
            const grassTexture = textureLoader.load(
                'grass.jpg',
                () => console.log('Texture loaded successfully'),
                undefined,
                (err) => console.error('Texture failed to load', err)
            );
            grassTexture.wrapS = THREE.RepeatWrapping;
            grassTexture.wrapT = THREE.RepeatWrapping;
            grassTexture.repeat.set(50, 50); // repeat texture

            // -----Grass-----
            const grassGeometry = new THREE.PlaneGeometry(1000, 1000);
            const grassMaterial = new THREE.MeshLambertMaterial({ map: grassTexture });
            const grass = new THREE.Mesh(grassGeometry, grassMaterial);
            grass.rotation.x = -Math.PI / 2;
            grass.receiveShadow = true;
            scene.add(grass);

			// -----Farmhouse-----
			const loader = new GLTFLoader();
			loader.load(
				'farmhouse__low-poly.glb',  // path to your farmhouse model
				(gltf) => {
					const farmhouse = gltf.scene;
					farmhouse.scale.set(8.5, 7, 7);
					farmhouse.position.set(-1.5, 10, -11.5); // center of field
					farmhouse.traverse((child) => {
						if (child.isMesh) {
							child.castShadow = true;							}
					}); 
					scene.add(farmhouse);
				},
				undefined,
				(err) => console.error('Error loading farmhouse:', err)
            );



			// -----Fences-----
			const fenceGroupZ = new THREE.Group();
			const fenceGroupX = new THREE.Group();
			const postGeom = new THREE.CylinderGeometry(0.7, 0.7, 10);
			const plankGeom = new THREE.BoxGeometry(20, 2.5, 1,4);			
			const fenceMaterial = new THREE.MeshStandardMaterial({ color: 0x8b5a2b });


			function createFenceZ(a = 0, b = 0) {
				const post1 = new THREE.Mesh(postGeom, fenceMaterial);
				post1.castShadow = true;
				const post2 = new THREE.Mesh(postGeom, fenceMaterial);
				post2.castShadow = true;
				const plank = new THREE.Mesh(plankGeom, fenceMaterial);
				plank.castShadow = true;
				post1.position.set(a, 5, b+2);                
				post2.position.set(a, 5, b+18);
				plank.position.set(a, 8, b+10);
				plank.rotation.y = Math.PI / 2;
				fenceGroupZ.add(post1, post2, plank);
				return fenceGroupZ;
			}
			
			function createFenceX(a = 0, b = 0) {
				const post1 = new THREE.Mesh(postGeom, fenceMaterial);
				post1.castShadow = true;
				const post2 = new THREE.Mesh(postGeom, fenceMaterial);
				post2.castShadow = true;
				const plank = new THREE.Mesh(plankGeom, fenceMaterial);
				plank.castShadow = true;
				post1.position.set(a+2, 5, b);                
				post2.position.set(a+18, 5, b);
				plank.position.set(a+10, 8, b);
				//plank.rotation.y = Math.PI / 2;
				fenceGroupX.add(post1, post2, plank);
				return fenceGroupX;
			}


			function placeFence(startX, startZ, steps, rotate=0){
				for (let i=0; i<steps; i++){
					if(rotate==1){
						const fence = createFenceX(startX, startZ);
						scene.add(fence);
						startX += 20;
					}
					else {
						const fence = createFenceZ(startX, startZ);
						scene.add(fence);
						startZ += 20;
					}
				}
				return 0;
			}

			function level0(){
				placeFence(-40, 40, 3);
				placeFence(-40, 100, 4, 1);
				placeFence(40, 40, 3);
			}

			level0();

			//-----Trees-----
			
			function createTree(x = 0, z = 0) {
			
				const tree = new THREE.Group();

				const trunkGeometry = new THREE.CylinderGeometry(2, 2, 20, 8);
				const trunkMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
				const trunk = new THREE.Mesh(trunkGeometry, trunkMaterial);
				trunk.castShadow = true;
				trunk.position.y = 10; 
				tree.add(trunk);

				const leavesGeometry = new THREE.ConeGeometry(10, 30, 8);
				const leavesMaterial = new THREE.MeshStandardMaterial({ color: 0x228B22 });
				const leaves = new THREE.Mesh(leavesGeometry, leavesMaterial);
				leaves.castShadow= true;
				leaves.position.y = 30; 
				tree.add(leaves);

				tree.position.set(x, 0, z);

				return tree;
			}

			const tree0 = createTree(-60, 70);
			scene.add(tree0);


			// -----Camera-----
            const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 1, 2000);
            camera.position.set(100, 100, 100);
            camera.lookAt(scene.position);
			
			let angle0 = Math.PI / 4;
			let radius0 = 100 * Math.sqrt(2);

			function updateCamera() {
    			camera.position.x = radius0 * Math.sin(angle0);
				camera.position.z = radius0 * Math.cos(angle0);
				camera.lookAt(0, 0, 0); 
			}

			window.addEventListener('keydown', (event) => {
				switch(event.key) {
					case 'ArrowLeft':
						angle0 -= 0.05;
						break;
					case 'ArrowRight':
						angle0 += 0.05;
						break;
					case 'ArrowUp':
						radius0 -= 0.5; 
						break;
					case 'ArrowDown':
						radius0 += 0.5; 
						break;
				}

				updateCamera();
			});

            // -----Lights------
            const ambientLight = new THREE.AmbientLight(0x223366, 1.5); 
           	scene.add(ambientLight);

            const sun = new THREE.DirectionalLight(0xffffff, 2);
            sun.position.set(-220, 200, 200);
            sun.castShadow = true;
			sun.shadow.mapSize.width = 4096;
			sun.shadow.mapSize.height = 4096;
			sun.shadow.camera.left = -500;
			sun.shadow.camera.right = 500;
			sun.shadow.camera.top = 500;
			sun.shadow.camera.bottom = -500;
			sun.shadow.camera.near = 1;
			sun.shadow.camera.far = 1000;
            scene.add(sun);

			let angle = 0;
            
			//-----Animation-----

			function animate() {
                requestAnimationFrame(animate);

                angle += 0.0025; 
                const radius = 500;
                sun.position.set(
                    radius * Math.cos(angle),
                    250 * Math.sin(angle), 
                    radius * Math.sin(angle)
                );
                
				sun.lookAt(0, 0, 0);

				const dayColor = new THREE.Color(0x87ceeb); 
				const nightColor = new THREE.Color(0x000022);
			
				const dayFactor = Math.max(0, sun.position.y / 250);

   				scene.background = nightColor.clone().lerp(dayColor, dayFactor);

				sun.intensity = 2 * dayFactor;

				renderer.render(scene, camera);

			}



			// -----Helpers-----
			//const axesHelper = new THREE.AxesHelper( 100 );
			//scene.add( axesHelper );
			//scene.add(new THREE.DirectionalLightHelper(sun, 50));
			const size = 1000;
			const divisions = 50;
			const gridHelper = new THREE.GridHelper( size, divisions, 0x000000, 0x000000 );
			scene.add( gridHelper );


            // Renderer
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);
			renderer.shadowMap.enabled = true;
			

            // Optional: make it responsive
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
				
            });
    
			animate();
		}
        window.onload = init;
    </script>

</body>
</html>
